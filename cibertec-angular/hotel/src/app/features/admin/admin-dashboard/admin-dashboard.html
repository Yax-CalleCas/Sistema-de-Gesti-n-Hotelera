<div class="container-fluid" *ngIf="stats$ | async as stats">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark">Panel de Administración</h3>

  </div>

  <div class="row g-4 mb-5">
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card p-3 border-0 shadow-sm border-start border-5 rounded-3 h-100" style="border-color: #4361ee;">
        <p class="text-muted mb-1 small fw-bold">DISPONIBLES</p>
        <h4 class="fw-bold text-dark mb-0">{{ stats.habitacionesDisponibles }}</h4>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card p-3 border-0 shadow-sm border-start border-5 rounded-3 h-100" style="border-color: #ef4444;">
        <p class="text-muted mb-1 small fw-bold">OCUPADAS</p>
        <h4 class="fw-bold text-dark mb-0">{{ stats.habitacionesOcupadas }}</h4>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card p-3 border-0 shadow-sm border-start border-5 rounded-3 h-100" style="border-color: #f59e0b;">
        <p class="text-muted mb-1 small fw-bold">ALERTAS STOCK</p>
        <h4 class="fw-bold text-dark mb-0">{{ stats.productosBajoStock }}</h4>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card p-3 border-0 shadow-sm border-start border-5 rounded-3 h-100" style="border-color: #10b981;">
        <p class="text-muted mb-1 small fw-bold">INGRESOS HOY</p>
        <h4 class="fw-bold text-dark mb-0">{{ stats.ingresosHoy | currency:'USD' }}</h4>
      </div>
    </div>
  </div>
</div>
