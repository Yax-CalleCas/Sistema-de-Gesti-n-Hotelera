<div class="container-fluid" *ngIf="stats$ | async as stats">
  <div class="d-flex align-items-center mb-4">
    <h3 class="fw-bold text-dark m-0"><i class="bi bi-speedometer2 text-primary me-2"></i> Panel de Administración</h3>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card stat-card border-blue h-100">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1 small fw-bold text-uppercase">Disponibles</p>
            <h4 class="fw-bold text-dark mb-0">{{ stats.habitacionesDisponibles }}</h4>
          </div>
          <i class="bi bi-door-open fs-3 text-primary opacity-50"></i>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card stat-card border-red h-100">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1 small fw-bold text-uppercase">Ocupadas</p>
            <h4 class="fw-bold text-dark mb-0">{{ stats.habitacionesOcupadas }}</h4>
          </div>
          <i class="bi bi-person-check fs-3 text-danger opacity-50"></i>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card stat-card border-yellow h-100">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1 small fw-bold text-uppercase">Alertas Stock</p>
            <h4 class="fw-bold text-dark mb-0">{{ stats.productosBajoStock }}</h4>
          </div>
          <i class="bi bi-exclamation-triangle fs-3 text-warning opacity-50"></i>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card stat-card border-green h-100">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1 small fw-bold text-uppercase">Ingresos Hoy</p>
            <h4 class="fw-bold text-dark mb-0">{{ stats.ingresosHoy | currency:'USD' }}</h4>
          </div>
          <i class="bi bi-currency-dollar fs-3 text-success opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
</div>
