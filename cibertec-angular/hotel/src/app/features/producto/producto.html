<main class="container mt-4">

  <section class="card mb-4" *ngIf="isEdit || form.dirty">
    <header class="card-header bg-dark text-white font-weight-bold">
      {{ isEdit ? 'Editar Producto' : 'Nuevo Producto' }}
    </header>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label small text-muted">Nombre del Producto</label>
            <input formControlName="nombre" class="form-control" placeholder="Ej. Zapatillas Running">
          </div>
          <div class="col-md-3 mb-2">
            <label class="form-label small text-muted">Precio</label>
            <input type="number" formControlName="precio" class="form-control" placeholder="0.00">
          </div>
          <div class="col-md-3 mb-2">
            <label class="form-label small text-muted">Stock Disponible</label>
            <input type="number" formControlName="cantidad" class="form-control" placeholder="0">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-2">
            <label class="form-label small text-muted">Detalle</label>
            <input formControlName="detalle" class="form-control" placeholder="Descripción breve">
          </div>
          <div class="col-md-6 mb-2">
            <label class="form-label small text-muted">URL de Imagen</label>
            <input formControlName="imagenUrl" class="form-control" placeholder="https://ejemplo.com/foto.jpg">
          </div>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-success me-2" [disabled]="form.invalid">
            <i class="bi bi-save"></i> {{ isEdit ? 'Actualizar' : 'Guardar' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancelar()">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </section>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0">Listado de Productos</h2>
    <button class="btn btn-primary" (click)="isEdit = false; form.markAsDirty()" *ngIf="!isEdit && !form.dirty">
      <i class="bi bi-plus-circle"></i> Nuevo Producto
    </button>
  </div>

  <section class="position-relative">
    <div *ngIf="isLoading" class="d-flex justify-content-center align-items-center my-5">
      <div class="spinner-border text-primary" role="status"></div>
      <span class="ms-3 text-muted">Sincronizando con el servidor...</span>
    </div>

    <div class="table-responsive" *ngIf="!isLoading && productos.length > 0">
      <table class="table table-hover align-middle mb-3">
        <thead class="table-light">
          <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of productosPaginados">
            <td>
              <img [src]="p.imagenUrl" alt="img" style="width: 40px; height: 40px; object-fit: cover;" class="rounded-circle">
            </td>
            <td class="fw-semibold">{{ p.nombre }}</td>
            <td>{{ p.precio | currency:'S/.' }}</td>
            <td>
              <span class="badge" [ngClass]="(p.cantidad ?? 0) > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
                {{ p.cantidad }} uds
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-warning btn-sm me-2" (click)="editar(p)">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-danger btn-sm" (click)="eliminar(p.idProducto)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <nav *ngIf="totalPaginas > 1" aria-label="Navegación de productos" class="d-flex justify-content-center mt-3">
        <ul class="pagination pagination-sm mb-0">
          <li class="page-item" [class.disabled]="paginaActual === 1">
            <button class="page-link" (click)="cambiarPagina(paginaActual - 1)" aria-label="Anterior">
              <span aria-hidden="true">&laquo;</span>
            </button>
          </li>

          <li class="page-item" *ngFor="let item of [].constructor(totalPaginas); let i = index" [class.active]="paginaActual === (i + 1)">
            <button class="page-link" (click)="cambiarPagina(i + 1)">{{ i + 1 }}</button>
          </li>

          <li class="page-item" [class.disabled]="paginaActual === totalPaginas">
            <button class="page-link" (click)="cambiarPagina(paginaActual + 1)" aria-label="Siguiente">
              <span aria-hidden="true">&raquo;</span>
            </button>
          </li>
        </ul>
      </nav>
    </div>

    <div *ngIf="!isLoading && productos.length === 0" class="alert alert-info text-center my-4">
      No hay productos registrados.
    </div>
  </section>
</main>
