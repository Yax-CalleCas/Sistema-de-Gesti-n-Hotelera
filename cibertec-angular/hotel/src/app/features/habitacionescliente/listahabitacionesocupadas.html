<div class="container-fluid py-4">
  <header class="dashboard-header d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-4 p-3 bg-white rounded shadow-sm">
    <div class="d-flex align-items-center">
      <div class="header-icon me-3 p-3 rounded-circle bg-light">
        <i class="bi fs-4" [ngClass]="esVistaOcupadas() ? 'bi-house-lock-fill text-danger' : 'bi-house-door-fill text-success'"></i>
      </div>
      <div>
        <h3 class="fw-bold mb-0">{{ esVistaOcupadas() ? 'Habitaciones Ocupadas' : 'Habitaciones Disponibles' }}</h3>
        <small class="text-muted">Gestión de {{ esVistaOcupadas() ? 'pedidos' : 'reservas' }} en tiempo real</small>
      </div>
    </div>

    <select class="form-select w-auto mt-3 mt-lg-0 shadow-sm border-0 bg-light"
            [ngModel]="idPisoSeleccionado()"
            (ngModelChange)="idPisoSeleccionado.set($event)">
      <option [ngValue]="0">Todos los pisos</option>
      <option *ngFor="let p of pisos()" [ngValue]="p.idPiso">Piso {{ p.descripcion }}</option>
    </select>
  </header>

  <div *ngIf="isLoading()" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row g-3" *ngIf="!isLoading()">
    <ng-container *ngFor="let h of habitacionesFiltradas(); trackBy: trackById">
<div class="col-12 col-md-4 col-lg-3 col-xl-2">
  <div class="card room-card h-100 shadow-sm" [class.occupied]="esVistaOcupadas()">
    <div class="card-body d-flex flex-column">

      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="badge rounded-pill bg-dark text-white px-3">{{ getCategoriaNombre(h.idCategoria) }}</span>
        <span class="room-number">#{{ h.numero }}</span>
      </div>

      <div class="room-icon-wrapper my-2">
        <i class="bi" [ngClass]="esVistaOcupadas() ? 'bi-house-lock-fill' : 'bi-house-check-fill'"></i>
      </div>

      <button class="btn w-100 mt-auto"
              [ngClass]="esVistaOcupadas() ? 'btn-outline-danger' : 'btn-outline-primary'"
              (click)="irAVenta(h.idHabitacion)">
        {{ esVistaOcupadas() ? 'Gestionar' : 'Reservar Ahora' }}
      </button>

    </div>
  </div>
</div>
    </ng-container>

    <div *ngIf="habitacionesFiltradas().length === 0" class="col-12 text-center py-5">
      <div class="empty-state">
        <i class="bi bi-search fs-1 text-muted"></i>
        <p class="text-muted mt-2">No se encontraron habitaciones según los filtros.</p>
      </div>
    </div>
  </div>
</div>
