<div class="d-flex min-vh-100">
  <aside class="sidebar d-flex flex-column p-3 text-white">
    <div class="d-flex align-items-center mb-4 px-2">
      <i class="bi bi-buildings-fill fs-2 me-2 text-white"></i>
      <span class="fs-4 fw-bold">Hotel</span>
    </div>

    <nav class="nav nav-pills flex-column mb-auto gap-1">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link text-white"><i class="bi bi-speedometer2 me-2"></i> Admin</a>
      <a routerLink="/admin/personas" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-people me-2"></i> Usuarios</a>
      <a routerLink="/admin/clientes" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-person-vcard me-2"></i> Clientes</a>
      <a routerLink="/admin/habitacion" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-door-open me-2"></i> G. Habitaciones</a>
      <a routerLink="/admin/categorias" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-tags me-2"></i>G. Categorías</a>
      <a routerLink="/admin/piso" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-layers me-2"></i>G. Pisos</a>
      <a routerLink="/admin/crudproductos" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-box-seam me-2"></i> Productos</a>
      <a routerLink="/admin/recepcion" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-clipboard-check me-2"></i> G. Recepción</a>
      <a routerLink="/admin/venta" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-house-lock me-2"></i> Venta Productos </a>
      <a routerLink="/admin/salidaHabitacion" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-box-arrow-left me-2"></i> Recepción Salida</a>
      <a routerLink="/admin/reportes" routerLinkActive="active" class="nav-link text-white"><i class="bi bi-file-earmark-bar-graph me-2"></i> Reportes</a>
    </nav>
  </aside>

  <main class="flex-grow-1 bg-light d-flex flex-column">
    <header class="navbar navbar-expand bg-white shadow-sm px-4 py-2 justify-content-end">
      <button class="btn btn-outline-danger btn-sm fw-bold" (click)="cerrarSesion()">
        <i class="bi bi-box-arrow-right me-1"></i> Salir
      </button>
    </header>

    <div class="p-4 flex-grow-1">
      <router-outlet></router-outlet>
    </div>

    <footer class="bg-white py-3 px-4 border-top">
      <div class="container-fluid">
        <div class="fw-bold">Sistema de Gestión Hotelera</div>
        <small>Desarrollado por Grupo 7 | Cibertec © 2026</small>
      </div>
    </footer>
  </main>
</div>
