<div class="container py-4">
  <h2 class="text-primary fw-bold mb-4"><i class="bi bi-people-fill me-2"></i> Gestión de Personas</h2>

  <section class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white fw-bold py-2">
      {{ personaSeleccionada.idPersona ? 'Editar' : 'Registrar' }} Persona
    </div>
    <div class="card-body">
      <form #f="ngForm" (ngSubmit)="f.valid && guardar()">
        <div class="row g-2">
          <div class="col-md-2">
            <input class="form-control" name="tipo" [(ngModel)]="personaSeleccionada.tipoDocumento" placeholder="Tipo Doc" required>
          </div>
          <div class="col-md-2">
            <input class="form-control" name="doc" [(ngModel)]="personaSeleccionada.documento" placeholder="Número" required>
          </div>
          <div class="col-md-4">
            <input class="form-control" name="nombre" [(ngModel)]="personaSeleccionada.nombre" placeholder="Nombre" required>
          </div>
          <div class="col-md-4">
            <input class="form-control" name="apellido" [(ngModel)]="personaSeleccionada.apellido" placeholder="Apellido" required>
          </div>
          <div class="col-md-4">
            <input type="email" class="form-control" name="correo" [(ngModel)]="personaSeleccionada.correo" placeholder="Correo" required>
          </div>

          <div class="col-md-4">
            <input type="password" class="form-control" name="clave"
                   [(ngModel)]="personaSeleccionada.clave"
                   placeholder="{{ personaSeleccionada.idPersona ? 'Nueva contraseña (opcional)' : 'Contraseña' }}"
                   [required]="!personaSeleccionada.idPersona">
          </div>

          <div class="col-md-4">
            <select class="form-select" name="idTipo" [(ngModel)]="personaSeleccionada.idTipoPersona" required>
              <option [ngValue]="0" disabled>Seleccionar Rol</option>
              <option [ngValue]="1">Administrador</option>
              <option [ngValue]="2">Empleado</option>
              <option [ngValue]="3">Cliente</option>
            </select>
          </div>
        </div>

        <div class="text-end mt-3">
          <button type="button" class="btn btn-outline-secondary me-2" (click)="limpiarFormulario()">Limpiar</button>
          <button type="submit" class="btn btn-success" [disabled]="!f.valid || isProcessing || personaSeleccionada.idTipoPersona === 0">
            <span *ngIf="isProcessing" class="spinner-border spinner-border-sm me-1"></span>
            {{ isProcessing ? 'Guardando...' : (personaSeleccionada.idPersona ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </div>
  </section>

  <section class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Documento</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th class="text-center">Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of paginatedPersonas">
            <td><small class="badge bg-light text-dark border">{{ p.tipoDocumento }}</small> {{ p.documento }}</td>
            <td>{{ p.nombre }} {{ p.apellido }}</td>
            <td>{{ p.correo }}</td>
            <td><span class="badge" [ngClass]="getRolBadgeClass(p.idTipoPersona)">{{ getRolNombre(p.idTipoPersona) }}</span></td>
            <td class="text-center">
              <button class="btn btn-sm" [ngClass]="p.estado ? 'text-success' : 'text-danger'" (click)="cambiarEstado(p)" type="button">
                <i class="bi" [ngClass]="p.estado ? 'bi-toggle-on fs-4' : 'bi-toggle-off fs-4'"></i>
              </button>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-warning me-1" (click)="editar(p)"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-outline-danger" (click)="eliminar(p.idPersona)"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
          <tr *ngIf="personas.length === 0">
            <td colspan="6" class="text-center text-muted py-4">No se encontraron registros de personas.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
