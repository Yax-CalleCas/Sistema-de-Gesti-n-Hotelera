<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold mb-0">
      <i class="bi bi-people-fill me-2"></i> Gestión de Personas
    </h2>
    <button class="btn btn-outline-primary shadow-sm" (click)="cargarPersonas()" [disabled]="isProcessing()">
      <i class="bi bi-arrow-clockwise me-1"></i> Refrescar
    </button>
  </div>

  <section class="card shadow-sm mb-4 border-0">
    <div class="card-header bg-white border-bottom-0 pt-3 fw-bold text-uppercase text-muted">
      {{ personaSeleccionada().idPersona ? 'Editar Persona' : 'Registrar Persona' }}
    </div>
    <div class="card-body">
      <form #f="ngForm" (ngSubmit)="f.valid && guardar()">
        <div class="row g-3">
          <div class="col-md-2">
            <label class="small fw-bold text-muted">Tipo Doc.</label>
            <input class="form-control" name="tipo" [ngModel]="personaSeleccionada().tipoDocumento" (ngModelChange)="personaSeleccionada.update(p => ({...p, tipoDocumento: $event}))" required>
          </div>
          <div class="col-md-2">
            <label class="small fw-bold text-muted">Número</label>
            <input class="form-control" name="doc" [ngModel]="personaSeleccionada().documento" (ngModelChange)="personaSeleccionada.update(p => ({...p, documento: $event}))" required>
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Nombre</label>
            <input class="form-control" name="nombre" [ngModel]="personaSeleccionada().nombre" (ngModelChange)="personaSeleccionada.update(p => ({...p, nombre: $event}))" required>
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Apellido</label>
            <input class="form-control" name="apellido" [ngModel]="personaSeleccionada().apellido" (ngModelChange)="personaSeleccionada.update(p => ({...p, apellido: $event}))" required>
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Correo Electrónico</label>
            <input type="email" class="form-control" name="correo" [ngModel]="personaSeleccionada().correo" (ngModelChange)="personaSeleccionada.update(p => ({...p, correo: $event}))" required>
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">URL Foto</label>
            <input class="form-control" name="foto" [ngModel]="personaSeleccionada().fotoUrl" (ngModelChange)="personaSeleccionada.update(p => ({...p, fotoUrl: $event}))" placeholder="https://...">
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Contraseña</label>
            <input type="password" class="form-control" name="clave" [ngModel]="personaSeleccionada().clave" (ngModelChange)="personaSeleccionada.update(p => ({...p, clave: $event}))" [required]="!personaSeleccionada().idPersona">
          </div>
          <div class="col-md-4">
            <label class="small fw-bold text-muted">Rol del Sistema</label>
            <select class="form-select" name="idTipo" [ngModel]="personaSeleccionada().idTipoPersona" (ngModelChange)="personaSeleccionada.update(p => ({...p, idTipoPersona: $event}))" required>
              <option [ngValue]="0" disabled>Seleccionar Rol</option>
              <option *ngFor="let rol of roles" [ngValue]="rol.id">{{ rol.nombre }}</option>
            </select>
          </div>
        </div>

        <div class="text-end mt-4">
          <button type="button" class="btn btn-light me-2" (click)="limpiarFormulario()">Limpiar</button>
          <button type="submit" class="btn btn-success px-4" [disabled]="!f.valid || isProcessing()">
            {{ isProcessing() ? 'Procesando...' : (personaSeleccionada().idPersona ? 'Actualizar' : 'Guardar') }}
          </button>
        </div>
      </form>
    </div>
  </section>

  <section class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Foto</th>
            <th>Documento</th>
            <th>Nombre Completo</th>
            <th>Correo</th>
            <th>Rol</th>
            <th class="text-center">Estado</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of paginatedPersonas(); trackBy: trackByPersona">
            <td class="ps-3">
              <img [src]="p.fotoUrl || 'assets/default-avatar.png'" width="40" height="40" class="rounded-circle shadow-sm" (error)="onImgError($event)">
            </td>
            <td>
              <span class="badge bg-light text-dark border">{{ p.tipoDocumento }}</span> {{ p.documento }}
            </td>
            <td>{{ p.nombre }} {{ p.apellido }}</td>
            <td>{{ p.correo }}</td>
            <td>
              <span class="badge rounded-pill" [ngClass]="getRolInfo(p.idTipoPersona).badge">
                {{ getRolInfo(p.idTipoPersona).nombre }}
              </span>
            </td>
            <td class="text-center">
              <button class="btn btn-sm" (click)="cambiarEstado(p)" [title]="p.estado ? 'Desactivar' : 'Activar'">
                <i class="bi fs-4" [ngClass]="p.estado ? 'bi-toggle-on text-success' : 'bi-toggle-off text-secondary'"></i>
              </button>
            </td>
            <td class="text-center">
              <button class="btn btn-sm btn-link text-warning p-1" (click)="editar(p)"><i class="bi bi-pencil-fill"></i></button>
              <button class="btn btn-sm btn-link text-danger p-1" (click)="eliminar(p.idPersona)"><i class="bi bi-trash-fill"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-white border-top-0 py-3" *ngIf="totalPaginas() > 1">
      <nav aria-label="Navegación de personas" class="d-flex justify-content-center">
        <ul class="pagination pagination-sm mb-0">
          <li class="page-item" [class.disabled]="currentPage() === 1">
            <button class="page-link" (click)="cambiarPagina(currentPage() - 1)" aria-label="Anterior">
              <span aria-hidden="true">&laquo;</span>
            </button>
          </li>

          <li class="page-item" *ngFor="let item of [].constructor(totalPaginas()); let i = index" [class.active]="currentPage() === (i + 1)">
            <button class="page-link" (click)="cambiarPagina(i + 1)">{{ i + 1 }}</button>
          </li>

          <li class="page-item" [class.disabled]="currentPage() === totalPaginas()">
            <button class="page-link" (click)="cambiarPagina(currentPage() + 1)" aria-label="Siguiente">
              <span aria-hidden="true">&raquo;</span>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</div>
