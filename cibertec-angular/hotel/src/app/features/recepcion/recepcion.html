<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-primary fw-bold">
      <i class="bi bi-calendar-check me-2"></i> Tablero de Recepción
    </h3>

    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small">Filtrar por piso:</span>
      <select class="form-select form-select-sm"
              [ngModel]="idPisoSeleccionado()"
              (ngModelChange)="idPisoSeleccionado.set($event)">
        <option [ngValue]="0">Todos los pisos</option>
        <option *ngFor="let p of pisos()" [ngValue]="p.idPiso">{{p.descripcion}}</option>
      </select>
    </div>
  </div>

  <div *ngIf="isLoading()" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Cargando habitaciones...</p>
  </div>

  <div class="row g-4" *ngIf="!isLoading()">
    <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let h of habitacionesFiltradas()">
      <div class="card h-100 shadow-sm border-0 transition-hover"
           [ngClass]="{
             'border-start border-4 border-success': h.idEstadoHabitacion == 1,
             'border-start border-4 border-danger': h.idEstadoHabitacion == 2,
             'border-start border-4 border-warning': h.idEstadoHabitacion == 3
           }">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title fw-bold m-0">Hab. {{ h.numero }}</h5>
            <span class="badge" [ngClass]="{
              'bg-success-subtle text-success': h.idEstadoHabitacion == 1,
              'bg-danger-subtle text-danger': h.idEstadoHabitacion == 2,
              'bg-warning-subtle text-warning': h.idEstadoHabitacion == 3
            }">
              {{ h.estadoDescripcion }}
            </span>
          </div>

          <p class="text-muted small mb-1">
            <i class="bi bi-tag me-1"></i> {{ h.categoriaNombre }}
          </p>
          <p class="text-muted small mb-3">
            <i class="bi bi-building me-1"></i> Piso: {{ h.idPiso }}
          </p>

          <button class="btn btn-sm w-100"
                  [ngClass]="h.idEstadoHabitacion == 1 ? 'btn-primary' : 'btn-outline-primary'"
                  (click)="abrirDetalle(h.idHabitacion)">
            <i class="bi" [ngClass]="h.idEstadoHabitacion == 1 ? 'bi-plus-circle' : 'bi-eye'"></i>
            {{ h.idEstadoHabitacion == 1 ? 'Registrar Ingreso' : 'Ver Detalle' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading() && habitacionesFiltradas().length === 0" class="text-center py-5">
    <i class="bi bi-search" style="font-size: 2rem;"></i>
    <p>No se encontraron habitaciones disponibles para este filtro.</p>
  </div>
</div>

<style>
  .transition-hover { transition: transform 0.2s; }
  .transition-hover:hover { transform: translateY(-5px); cursor: pointer; }
</style>
