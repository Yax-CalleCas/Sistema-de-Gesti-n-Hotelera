<div class="container mt-4">
  <h2 class="mb-4 text-primary">Recepción de Habitaciones</h2>

  <div class="row mb-4">
    <div class="col-md-4">
      <label class="form-label font-weight-bold">Filtrar por Piso:</label>
      <select class="form-select" [(ngModel)]="idPisoSeleccionado">
        <option [value]="0">--- Todos los Pisos ---</option>
        <option *ngFor="let p of pisos" [value]="p.idPiso">
          {{ p.descripcion }}
        </option>
      </select>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Cargando la cuadrícula de habitaciones...</p>
  </div>

  <div class="row" *ngIf="!isLoading">
    <div class="col-xl-3 col-lg-4 col-md-6 mb-4" *ngFor="let h of habitacionesFiltradas">

      <div class="card h-100 shadow-sm border-start border-4"
           [ngClass]="{
             'border-success': h.idEstadoHabitacion === 1,
             'border-danger': h.idEstadoHabitacion === 2,
             'border-warning': h.idEstadoHabitacion === 3
           }">

        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="card-title font-weight-bold mb-0">Nro: {{ h.numero }}</h5>

            <span class="badge"
                  [ngClass]="{
                    'bg-success': h.idEstadoHabitacion === 1,
                    'bg-danger': h.idEstadoHabitacion === 2,
                    'bg-warning': h.idEstadoHabitacion === 3
                  }">
              {{ h.estadoDescripcion }}
            </span>
          </div>

          <p class="card-text text-muted mb-1">
            <strong>Categoría:</strong> {{ h.categoriaNombre }}
          </p>
          <p class="card-text mb-3">
            <strong>Precio:</strong> <span class="text-dark font-weight-bold">S/. {{ h.precio }}</span>
          </p>

          <button type="button"
                  class="btn btn-primary w-100 mt-auto"
                  (click)="abrirDetalle(h)">
            <i class="bi bi-eye-fill me-1"></i> Ver Detalle
          </button>
        </div>
      </div>

    </div>

    <div class="col-12 text-center my-4" *ngIf="habitacionesFiltradas.length === 0">
      <div class="alert alert-warning" role="alert">
        No se encontraron habitaciones disponibles en este piso.
      </div>
    </div>
  </div>
</div>
