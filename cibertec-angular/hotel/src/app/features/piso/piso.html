<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Gestión de Pisos</h3>
    <button class="btn btn-primary" (click)="abrir()">
      <i class="bi bi-plus-circle me-1"></i> Registrar Piso
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Cargando datos del servidor...</p>
  </div>

  <div *ngIf="!isLoading" class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of pisos">
          <td>{{p.idPiso}}</td>
          <td>{{p.descripcion}}</td>
          <td>
            <span [class]="p.estado ? 'badge bg-success' : 'badge bg-secondary'">
              {{p.estado ? 'Activo' : 'Inactivo'}}
            </span>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-warning me-2" (click)="abrir(p)">
              <i class="bi bi-pencil"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPiso" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ piso.idPiso ? 'Editar Piso' : 'Registrar Piso' }}</h5>
        <button type="button" class="btn-close" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <form #f="ngForm" (ngSubmit)="guardar()">
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text" class="form-control" [(ngModel)]="piso.descripcion" name="descripcion" required>
          </div>

          <div class="mb-4">
            <label class="form-label d-block">Estado del registro</label>
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="flexSwitchCheckChecked"
                [(ngModel)]="piso.estado"
                name="estado">
              <label class="form-check-label" for="flexSwitchCheckChecked">
                {{ piso.estado ? 'Activo' : 'Inactivo' }}
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100" [disabled]="!f.valid || isProcessing">
            {{ isProcessing ? 'Guardando...' : 'Guardar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
