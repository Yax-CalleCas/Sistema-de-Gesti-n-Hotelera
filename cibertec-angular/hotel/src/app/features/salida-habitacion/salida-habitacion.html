<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="text-danger fw-bold"><i class="bi bi-box-arrow-right me-2"></i> Salida de Huéspedes</h2>
      <p class="text-muted small">Gestiona el cierre de cuenta y liberación de habitaciones</p>
    </div>
  </div>

  <div class="card shadow-sm border-0 mb-4 bg-white">
    <div class="card-body p-3">
      <div class="row align-items-center">
        <div class="col-md-4">
          <label class="form-label fw-bold text-uppercase small text-secondary">Filtrar por Piso</label>
          <select class="form-select border-primary-subtle" [ngModel]="idPisoSeleccionado()" (ngModelChange)="idPisoSeleccionado.set($event)">
            <option [value]="0"> Todos los pisos</option>
            <option *ngFor="let p of pisos()" [value]="p.idPiso"> {{ p.descripcion }}</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="isLoading()" class="text-center py-5">
    <div class="spinner-border text-danger" role="status"></div>
    <p class="text-muted mt-2 small">Cargando habitaciones ocupadas...</p>
  </div>

  <div class="row g-3" *ngIf="!isLoading()">
    <div class="col-xl-3 col-lg-4 col-md-6" *ngFor="let h of habitacionesFiltradas(); trackBy: trackByHabitacion">
      <div class="card h-100 border-0 shadow-sm room-card">
        <div class="card-body d-flex flex-column p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 class="fw-bold mb-0 text-primary">Nº {{ h.numero }}</h3>
            <span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill">
              {{ h.estadoDescripcion }}
            </span>
          </div>

          <ul class="list-unstyled text-secondary small mb-4">
            <li class="mb-2"><i class="bi bi-tag me-2 text-primary"></i><strong>Cat:</strong> {{ h.categoriaNombre }}</li>
            <li><i class="bi bi-cash-stack me-2 text-primary"></i><strong>Tarifa:</strong> S/. {{ h.precio | number:'1.2-2' }}</li>
          </ul>

          <button (click)="procesarSalidaVenta(h)" class="btn btn-danger w-100 mt-auto fw-bold py-2">
            <i class="bi bi-receipt-cutoff me-2"></i> Procesar Salida
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center py-5" *ngIf="!isLoading() && habitacionesFiltradas().length === 0">
    <div class="display-1 text-success opacity-25 mb-3"><i class="bi bi-house-check"></i></div>
    <h5 class="text-muted">¡Todo listo!</h5>
    <p class="text-secondary">No hay habitaciones ocupadas en este sector.</p>
  </div>
</div>
