<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Gestión de Categorías</h3>
    <button class="btn btn-primary" (click)="abrir()">
      <i class="bi bi-plus-circle me-1"></i> Nueva Categoría
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-primary">
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categorias">
          <td>{{c.idCategoria}}</td>
          <td>{{c.descripcion}}</td>
          <td>
            <span [class]="c.estado ? 'badge bg-success' : 'badge bg-danger'">
              {{c.estado ? 'Activa' : 'Inactiva'}}
            </span>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-warning me-2" (click)="abrir(c)">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="eliminar(c.idCategoria)">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalCat" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ categoria.idCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}</h5>
        <button type="button" class="btn-close" (click)="cerrarModal()"></button>
      </div>
      <div class="modal-body">
        <form #f="ngForm" (ngSubmit)="guardar()">
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text" class="form-control" [(ngModel)]="categoria.descripcion" name="descripcion" required minlength="3">
          </div>

          <div class="mb-3 form-check form-switch" *ngIf="categoria.idCategoria > 0">
            <input class="form-check-input" type="checkbox" [(ngModel)]="categoria.estado" name="estado" id="estadoCheck">
            <label class="form-check-label" for="estadoCheck">Categoría Activa</label>
          </div>

          <button type="submit" class="btn btn-success w-100" [disabled]="!f.valid || isProcessing">
            {{ isProcessing ? 'Guardando...' : 'Guardar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
